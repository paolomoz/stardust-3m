version: 1

indices:
  pages:
    include:
      - '/3m/en_us/**'
    exclude:
      - '/3m/en_us/industries'
      - '/3m/en_us/products'
    target: /3m/en_us/query-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: |
          attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, 'content')
      template:
        select: head > meta[name="template"]
        value: |
          attribute(el, 'content')
      lastModified:
        select: none
        value: |
          parseTimestamp(headers('last-modified'), 'ddd, DD MMM YYYY hh:mm:ss GMT')
